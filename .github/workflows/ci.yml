name: CI - 모두가 작가

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ==========================================
  # Backend 테스트 (A12 테스트 에이전트)
  # ==========================================
  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 린트 검사 (ruff)
        run: ruff check app/ tests/

      - name: 타입 검사 (mypy)
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: 단위 테스트 실행
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        env:
          OPENAI_API_KEY: test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test-key
          SUPABASE_SERVICE_KEY: test-key
          JWT_SECRET_KEY: test-jwt-secret-key
          CLOVA_SPEECH_SECRET: test-secret
          CLOVA_SPEECH_INVOKE_URL: https://test.clova.ai
          CLOVA_VOICE_CLIENT_ID: test-id
          CLOVA_VOICE_CLIENT_SECRET: test-secret

  # ==========================================
  # Frontend 테스트 (A12 + A17 접근성 감사)
  # ==========================================
  frontend-test:
    name: Frontend Tests (Vitest + Accessibility)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: TypeScript 타입 검사
        run: npx tsc --noEmit
        continue-on-error: true

      - name: ESLint 검사
        run: npm run lint
        continue-on-error: true

      - name: 단위 테스트 + 접근성 테스트
        run: npm run test:run
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

      - name: 테스트 커버리지
        run: npm run test:coverage
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  # ==========================================
  # 빌드 검증
  # ==========================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend 빌드
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

      - name: Docker 빌드 확인
        run: |
          docker build -t moduga-jakga-backend ./backend
          docker build -t moduga-jakga-frontend ./frontend

  # ==========================================
  # A16 품질 게이트 최종 판정
  # ==========================================
  quality-gate:
    name: Quality Gate (A16)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, build]
    if: always()

    steps:
      - name: 품질 게이트 판정
        run: |
          echo "=== A16 품질 보증 에이전트 - 품질 게이트 판정 ==="
          echo ""
          echo "gate_1_code: 린트/타입 에러 0건 → ${{ needs.backend-test.result }}"
          echo "gate_2_tests: 테스트 통과 → ${{ needs.frontend-test.result }}"
          echo "gate_3_build: 빌드 성공 → ${{ needs.build.result }}"
          echo ""

          if [ "${{ needs.backend-test.result }}" = "failure" ] || \
             [ "${{ needs.frontend-test.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ 품질 게이트 FAIL - 배포 불가"
            exit 1
          else
            echo "✅ 품질 게이트 PASS - 배포 가능"
          fi
